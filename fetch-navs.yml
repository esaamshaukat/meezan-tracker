name: Fetch Meezan NAVs Daily

on:
  schedule:
    - cron: '0 3 * * *'    # 3AM UTC  = 8AM PKT  = 6AM Bahrain
    - cron: '0 10 * * *'   # 10AM UTC = 3PM PKT  = 1PM Bahrain
    - cron: '0 16 * * *'   # 4PM UTC  = 9PM PKT  = 7PM Bahrain
  workflow_dispatch:        # Manual run from GitHub Actions tab

jobs:
  fetch-navs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests firebase-admin pandas lxml

      - name: Fetch NAVs and push to Firebase
        env:
          FIREBASE_PROJECT_ID:   ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:  ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: python fetch_navs.py
